<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Fútbol Libre App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0e0e0e;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #161616;
            padding: 15px;
            border-bottom: 3px solid #ffcc00;
        }
        .main-frame {
            max-width: 800px;
            margin: 20px auto;
            padding: 10px;
        }
        .preframe {
            position: relative;
            padding-bottom: 56.25%; /* Relación de aspecto 16:9 perfecta */
            height: 0;
            overflow: hidden; 
            background-color: #000;
            border-radius: 8px;
            border: 2px solid #222;
        }
        .preframe iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        /* Separadores de categorías */
        .titulo-categoria {
            margin-top: 25px;
            margin-bottom: 10px;
            font-size: 18px;
            color: #ffcc00;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .menu-canales {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .btn-canal {
            background-color: #ffcc00;
            color: black;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .btn-canal:hover {
            background-color: #e6b800;
        }
    </style>
</head>
<body>

    <header>
        <h1>⚽ MI APP DE FÚTBOL ⚽</h1>
    </header>

    <main class="main-frame">
        <div class="preframe">
            <iframe id="reproductor-principal" allowfullscreen="true" scrolling="no" src="https://latamvidzfy.org/dsportsplus.php" frameborder="0"></iframe>
        </div>

        <!-- SECCIÓN: CANALES INTERNACIONALES -->
        <h3 class="titulo-categoria">Canales Internacionales</h3>
        <div class="menu-canales">
            <button class="btn-canal" onclick="cambiarCanal('https://latamvidzfy.org/dsportsplus.php')">DSports Plus</button>
            <button class="btn-canal" onclick="cambiarCanal('https://latamvidzfy.org/espn1.php')">ESPN 1</button>
            <button class="btn-canal" onclick="cambiarCanal('https://latamvidzfy.org/fox1us.php')">🦊 Fox Sport</button>
        </div>

        <!-- SECCIÓN: FÚTBOL ARGENTINO -->
        <h3 class="titulo-categoria">Fútbol Argentino</h3>
        <div class="menu-canales">
            <button class="btn-canal" onclick="cambiarCanal('https://latamvidzfy.org/tntsports.php')">🔥 TNT Sports</button>
            <!-- Corregido el nombre del botón -->
            <button class="btn-canal" onclick="cambiarCanal('https://latamvidzfy.org/foxsportspremium.php')">⭐ ESPN Premium</button>
        </div>
    </main>

    <script>
        function cambiarCanal(urlDelPartido) {
            document.getElementById('reproductor-principal').src = urlDelPartido;
        }
    </script>

</body>
</html><title>ESTA EN PROCESO, POR SI ENCUENTRAS  ALGUNOS ERRORES</title>
