<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIEMPO FUTBOL</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0e0e0e;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #161616;
            padding: 15px;
            border-bottom: 3px solid #ffcc00;
        }
        .alerta-vivo {
            color: red;
            font-weight: bold;
            font-size: 18px;
            margin: 15px 0;
            animation: parpadear 1s infinite;
        }
        @keyframes parpadear {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
        .main-frame {
            max-width: 800px;
            margin: 20px auto;
            padding: 10px;
        }
        .preframe {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden; 
            background-color: #000;
            border-radius: 8px;
            border: 2px solid #222;
        }
        .preframe iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .titulo-categoria {
            margin-top: 25px;
            margin-bottom: 10px;
            font-size: 18px;
            color: #ffcc00;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .menu-canales {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .btn-canal {
            background-color: #ffcc00;
            color: black;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .btn-canal:hover {
            background-color: #e6b800;
        }
        .footer-nota {
            margin-top: 40px;
            font-size: 12px;
            color: #888;
            padding: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>⚽ TIEMPO FUTBOL ⚽</h1>
    </header>

    <main class="main-frame">
        <div class="alerta-vivo">🔴 MUNDIAL EN VIVO 🔴</div>

        <div class="preframe">
            <iframe id="reproductor-principal" 
                    allowfullscreen="true" 
                    scrolling="no" 
                    src="https://latamvidzfy.org/dsportsar.php" 
                    frameborder="0">
            </iframe>
        </div>

        <h3 class="titulo-categoria">Canales Internacionales</h3>
        <div class="menu-canales">
            <button class="btn-canal" onclick="cambiarCanal('https://latamvidzfy.org/dsportsar.php')">DSports Arg</button>
            <button class="btn-canal" onclick="cambiarCanal('https://latamvidzfy.org/espn1.php')">ESPN 1</button>
            <button class="btn-canal" onclick="cambiarCanal('https://latamvidzfy.org/fox1us.php')">🦊 Fox Sport</button>
        </div>

        <h3 class="titulo-categoria">Fútbol Argentino</h3>
        <div class="menu-canales">
            <button class="btn-canal" onclick="cambiarCanal('https://latamvidzfy.org/tntsports.php')">🔥 TNT Sports</button>
            <button class="btn-canal" onclick="cambiarCanal('https://latamvidzfy.org/foxsportspremium.php')">⭐ ESPN Premium</button>
        </div>

        <div class="footer-nota">
            La pagina esta en proceso, por si encuentras algun error, por favor reportalo a mi correo: sultanindio2@gmail.com
        </div>
    </main>

    <script>
        function cambiarCanal(urlDelPartido) {
            document.getElementById('reproductor-principal').src = urlDelPartido;
        }
    </script>

</body>
</html>
