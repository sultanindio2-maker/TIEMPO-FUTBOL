<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIEMPO FUTBOL</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #050505;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #1a1a1a;
            padding: 20px;
            border-bottom: 4px solid #ffcc00;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        h1 { margin: 0; letter-spacing: 2px; text-transform: uppercase; }
        
        .contador-flotante {
            position: fixed;
            top: 10px;
            right: 10px;
            background-color: rgba(0,0,0,0.8);
            padding: 10px;
            border: 1px solid #ffcc00;
            border-radius: 8px;
            z-index: 1000;
            font-size: 11px;
        }

        .alerta-vivo {
            background: linear-gradient(90deg, #ff0000, #8b0000);
            color: white;
            padding: 12px;
            font-weight: bold;
            font-size: 20px;
            margin: 20px auto;
            max-width: 600px;
            border-radius: 50px;
            animation: pulse 2s infinite;
            text-transform: uppercase;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .main-frame { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        .preframe {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background-color: #000;
            border-radius: 12px;
            border: 4px solid #1a1a1a;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .preframe iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        .titulo-categoria {
            margin: 30px 0 15px;
            color: #ffcc00;
            font-size: 16px;
            text-transform: uppercase;
        }
        .menu-canales {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn-canal {
            background-color: #ffffff;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-canal:hover {
            background-color: #ffcc00;
            transform: translateY(-2px);
        }

        .footer-nota { margin-top: 50px; font-size: 12px; color: #555; }
    </style>
</head>
<body>

    <div class="contador-flotante">
        Visitas:<br>
        <a href="https://www.hitwebcounter.com" target="_blank">
        <img src="https://hitwebcounter.com/counter/counter.php?pageid=16584950&style=0005&nbdigits=5&type=page&initCount=0" title="Contador" border="0" /></a>
    </div>

    <header>
        <h1>TIEMPO FUTBOL</h1>
    </header>

    <main class="main-frame">
        <div class="alerta-vivo">🔴 MUNDIAL EN VIVO 🔴</div>

        <div class="preframe">
            <iframe id="reproductor-principal" 
                    allowfullscreen="true" 
                    scrolling="no" 
                    src="https://latamvidzfy.org/dsportsar.php" 
                    frameborder="0">
            </iframe>
        </div>

        <h3 class="titulo-categoria">Canales Internacionales</h3>
        <div class="menu-canales">
            <button class="btn-canal" onclick="cambiarCanal('https://latamvidzfy.org/dsportsar.php')">DSports Arg</button>
            <button class="btn-canal" onclick="cambiarCanal('https://latamvidzfy.org/espn1.php')">ESPN 1</button>
            <button class="btn-canal" onclick="cambiarCanal('https://latamvidzfy.org/fox1us.php')">Fox Sport</button>
        </div>

        <h3 class="titulo-categoria">Fútbol Argentino</h3>
        <div class="menu-canales">
            <button class="btn-canal" onclick="cambiarCanal('https://latamvidzfy.org/tntsports.php')">TNT Sports</button>
            <button class="btn-canal" onclick="cambiarCanal('https://latamvidzfy.org/foxsportspremium.php')">ESPN Premium</button>
        </div>

        <div class="footer-nota">
            Reportar errores a: sultanindio2@gmail.com
        </div>
    </main>

    <script>
        function cambiarCanal(urlDelPartido) {
            document.getElementById('reproductor-principal').src = urlDelPartido;
        }
    </script>

</body>
</html>
